---
# Flat File to Ansible Inventory Converter (tech-group output, BU sub-group)
# Produces host metadata only - credentials handled by AAP2.
#
# Input Format: PLATFORM SERVER DATABASE SERVICE PORT VERSION [CONNECTION] [MODE_SUFFIX]
#   CONNECTION  (optional, 7th column): WINRM or DIRECT (default: DIRECT)
#   MODE_SUFFIX (optional, 8th column): free-text qualifier appended to host_id
#                                        so the same server:port can have multiple
#                                        inventory entries with distinct ids
#                                        (e.g. direct, winrm, EE, DELEGATE_CONNECTION)
#
# Output layout (single-BU fragment):
#
#   all:
#     children:
#       db_<bu>:
#         vars: { ssc_sn_bu, inspec_delegate_host, ... }
#         children: { db_<bu>_mssql, db_<bu>_oracle, db_<bu>_sybase, db_<bu>_postgres }
#       mssql_databases:      { children: { db_<bu>_mssql:    { hosts: {...} } } }
#       oracle_databases:     { children: { db_<bu>_oracle:   { hosts: {...} } } }
#       sybase_databases:     { children: { db_<bu>_sybase:   { hosts: {...} } } }
#       postgres_databases:   { children: { db_<bu>_postgres: { hosts: {...} } } }
#
# The db_<bu> aggregator exists so `--limit db_<bu>` targets every
# platform for a BU. Subgroup names must be unique per platform to
# avoid Ansible's group-name-is-global collision (a repeated plain
# `db_<bu>` under multiple tech groups merges every host list into
# one group).
#
# Run once per BU. Combine multiple single-BU outputs into a single env-level
# file by hand (or via a simple YAML merge) to produce the final
# DEVTEST_NA_Inv_InSpec_Database that ships to AAP.
#
# Required parameters:
#   target_bu        - Business unit identifier (lowercase, e.g., alpha)
#   ssc_environment  - Environment label for ssc_sn_environment (e.g., test, prod)
#   ssc_region       - Region label for ssc_sn_region (e.g., na, eu, apac)
#   flatfile_input   - Path to the flat-file input
#   inventory_output - Path to the generated inventory file
#
# Optional:
#   inspec_delegate_host    - Delegate host for InSpec execution (default: "")
#   mssql_connection_mode   - 'winrm' or 'direct' default for MSSQL (default: direct)
#   sybase_ssh_user_default - Default SSH user for Sybase scans (default: sybase_admin)
#   exec_timeout            - Per-host scan timeout seconds (default: 600)

- name: Convert Flat File to tech-group + BU Inventory
  hosts: localhost
  gather_facts: true
  vars:
    input_file: "{{ flatfile_input }}"
    output_file: "{{ inventory_output }}"

    # Aggregator group (holds BU-wide vars) and platform-specific
    # subgroups. Subgroup names must be unique across tech groups to
    # avoid Ansible's group-name-is-global collision (see
    # DEVTEST_NA_Inv_InSpec_Database header for the rationale).
    bu_group: "db_{{ target_bu }}"
    bu_mssql_group: "db_{{ target_bu }}_mssql"
    bu_oracle_group: "db_{{ target_bu }}_oracle"
    bu_sybase_group: "db_{{ target_bu }}_sybase"
    bu_postgres_group: "db_{{ target_bu }}_postgres"

    delegate_host: "{{ inspec_delegate_host | default('') }}"
    mssql_default_connection: "{{ mssql_connection_mode | default('direct') }}"
    sybase_ssh_user_value: "{{ sybase_ssh_user_default | default('sybase_admin') }}"
    exec_timeout_value: "{{ exec_timeout | default(600) }}"

    # NOTE: dict keys are not templated in `vars:`; the tech+BU scaffold is
    # built in pre_tasks via set_fact so the bu_group key resolves at runtime.
    inventory_data:
      all:
        children: {}

    platform_counts:
      mssql: 0
      oracle: 0
      sybase: 0
      postgres: 0

    winrm_counts:
      mssql: 0

  pre_tasks:
    - name: Validate required parameters
      ansible.builtin.fail:
        msg: "Missing required parameter: {{ item }}"
      when: lookup('vars', item, default='') | length == 0
      loop:
        - target_bu
        - ssc_environment
        - ssc_region
        - flatfile_input
        - inventory_output
      loop_control:
        label: "{{ item }}"

    - name: Initialize aggregator + platform-specific BU subgroups (templated keys)
      ansible.builtin.set_fact:
        inventory_data:
          all:
            children: "{{ {
              bu_group: {
                'vars': bu_vars,
                'children': {
                  bu_mssql_group: {},
                  bu_oracle_group: {},
                  bu_sybase_group: {},
                  bu_postgres_group: {}
                }
              },
              'mssql_databases': {
                'children': {bu_mssql_group: {'hosts': {}}}
              },
              'oracle_databases': {
                'children': {bu_oracle_group: {'hosts': {}}}
              },
              'sybase_databases': {
                'children': {bu_sybase_group: {'hosts': {}}}
              },
              'postgres_databases': {
                'children': {bu_postgres_group: {'hosts': {}}}
              }
            } }}"
      vars:
        bu_vars:
          ssc_sn_environment: "{{ ssc_environment }}"
          ssc_sn_region: "{{ ssc_region }}"
          ssc_sn_bu: "{{ target_bu }}"
          exec_timeout: "{{ exec_timeout_value }}"
          ansible_connection: local
          inspec_delegate_host: "{{ delegate_host }}"

  tasks:
    - name: Check input file exists
      ansible.builtin.stat:
        path: "{{ input_file }}"
      register: input_stat

    - name: Fail if input file missing
      ansible.builtin.fail:
        msg: "Input file not found: {{ input_file }}"
      when: not input_stat.stat.exists

    - name: Read flat file
      ansible.builtin.slurp:
        src: "{{ input_file }}"
      register: flat_file

    - name: Parse lines
      ansible.builtin.set_fact:
        lines: "{{ (flat_file.content | b64decode).split('\n') }}"

    - name: Process each line
      ansible.builtin.include_tasks: process_flatfile_line.yml
      loop: "{{ lines }}"
      loop_control:
        index_var: idx
        label: "Line {{ idx + 1 }}"
      when:
        - item | trim | length > 0
        - not item.strip().startswith('#')

    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ output_file | dirname }}"
        state: directory
        mode: '0755'
      when: output_file | dirname | length > 0 and output_file | dirname != '.'

    - name: Write inventory file
      ansible.builtin.copy:
        dest: "{{ output_file }}"
        mode: '0644'
        content: |
          ---
          # Generated Inventory - Database Compliance Scanning
          # BU: {{ target_bu }} | Env: {{ ssc_environment }} | Region: {{ ssc_region }}
          # Source: {{ input_file }}
          # Generated: {{ ansible_date_time.iso8601 }}
          # Credentials are injected by AAP2 Custom Credential at runtime.

          {{ inventory_data | to_nice_yaml(indent=2) }}

    - name: Summary
      ansible.builtin.debug:
        msg: |
          Conversion complete: {{ output_file }}
          - BU aggregator: {{ bu_group }} (env={{ ssc_environment }}, region={{ ssc_region }})
          - Subgroups: {{ bu_mssql_group }}, {{ bu_oracle_group }}, {{ bu_sybase_group }}, {{ bu_postgres_group }}
          - MSSQL: {{ platform_counts.mssql }} hosts ({{ winrm_counts.mssql }} WinRM)
          - Oracle: {{ platform_counts.oracle }} hosts
          - Sybase: {{ platform_counts.sybase }} hosts
          - PostgreSQL: {{ platform_counts.postgres }} hosts
          - Total: {{ platform_counts.mssql + platform_counts.oracle + platform_counts.sybase + platform_counts.postgres }} hosts
          - MSSQL Default Connection: {{ mssql_default_connection | upper }}
          - Delegate Host: {{ delegate_host if delegate_host | length > 0 else 'none (local execution)' }}
