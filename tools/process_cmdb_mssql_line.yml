---
# Process single MSSQL CMDB row (DictReader output, called from convert_cmdb_to_inventory.yml).
# Expected dict keys: Name (INSTANCE@SERVER.DOMAIN), Version name, Validation Status,
#                     Comments, TCP port(s)
# Server-level dedup: one host per (server, port). Emits database_platform=mssql.
# Connection warnings are NOT written to the inventory; they are appended to
# connection_warnings (sidecar diagnostics) instead.

- name: Reset per-row state
  ansible.builtin.set_fact:
    has_connection_warning: false
    mssql_fqdn: ''
    host_id: ''

- name: Compute MSSQL validation flag
  ansible.builtin.set_fact:
    is_validated: >-
      {{ ('validated' in (item['Validation Status'] | default('') | lower))
         and ('not validated' not in (item['Validation Status'] | default('') | lower)) }}

- name: Increment MSSQL skipped count (not validated)
  ansible.builtin.set_fact:
    skipped_counts: "{{ skipped_counts | combine({'mssql': skipped_counts.mssql + 1}) }}"
  when: not (is_validated | bool)

- name: Process validated MSSQL entry
  when: is_validated | bool
  block:
    - name: Parse Name (INSTANCE@SERVER)
      ansible.builtin.set_fact:
        raw_name: "{{ item['Name'] | default('') }}"
        mssql_instance_name: "{{ (item['Name'] | default('')).split('@')[0] }}"
        mssql_fqdn: "{{ ((item['Name'] | default('')).split('@')[1] | default('')) }}"
        version_name: "{{ item['Version name'] | default('') }}"
        cp_port: "{{ item['TCP port(s)'] | default('') }}"
        comments: "{{ item['Comments'] | default('') }}"

    - name: Skip MSSQL entries with invalid Name format
      when: mssql_fqdn | length == 0
      block:
        - name: Log skipped MSSQL entry (bad Name)
          ansible.builtin.debug:
            msg: "Skipping MSSQL row {{ idx + 1 }}: invalid Name '{{ raw_name }}' (expected INSTANCE@SERVER)"
        - name: Increment MSSQL skipped count (bad name)
          ansible.builtin.set_fact:
            skipped_counts: "{{ skipped_counts | combine({'mssql': skipped_counts.mssql + 1}) }}"

    - name: Add MSSQL host to inventory (server-level dedup)
      when: mssql_fqdn | length > 0
      block:
        - name: Determine MSSQL port
          ansible.builtin.set_fact:
            mssql_port: "{{ cp_port if (cp_port | trim | length > 0) else '1433' }}"

        - name: Build MSSQL host_id (server:port)
          ansible.builtin.set_fact:
            host_id: "{{ (mssql_fqdn.split('.')[0] + '_' + mssql_port | string) | replace('.', '_') | replace('-', '_') }}"

        - name: Log duplicate MSSQL server
          ansible.builtin.debug:
            msg: "Duplicate MSSQL: {{ mssql_fqdn }}:{{ mssql_port }} (instance {{ mssql_instance_name }})"
          when: host_id in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts

        - name: Detect connection warnings (new MSSQL hosts only)
          ansible.builtin.set_fact:
            has_connection_warning: "{{ ('unable to connect' in (comments | lower)) or ('unable to validate' in (comments | lower)) }}"
          when: host_id not in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts

        - name: Append MSSQL warning to diagnostics list
          ansible.builtin.set_fact:
            connection_warnings: "{{ connection_warnings + [{'platform': 'mssql', 'host': raw_name, 'comment': comments}] }}"
          when:
            - host_id not in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts
            - has_connection_warning | bool

        # NOTE: host-add and counter-bump are merged into one set_fact. With a
        # block-level `when: host_id not in ...hosts`, the second task would
        # skip because Ansible re-evaluates the block when per task and the
        # host has just been added.
        - name: Add new MSSQL host (server-level dedup)
          when: host_id not in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts
          ansible.builtin.set_fact:
            inventory_data: >-
              {{ inventory_data | combine({
                'all': {
                  'children': {
                    'mssql_databases': {
                      'children': {
                        bu_mssql_group: {
                          'hosts': inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts | combine({
                            host_id: {
                              'mssql_server': mssql_fqdn,
                              'mssql_port': mssql_port | int,
                              'mssql_version': version_name,
                              'mssql_instance': mssql_instance_name,
                              'mssql_database': 'master',
                              'mssql_username': 'nist_scan_user'
                            }
                          })
                        }
                      }
                    }
                  }
                }
              }, recursive=true) }}
            platform_counts: "{{ platform_counts | combine({'mssql': platform_counts.mssql + 1}) }}"
