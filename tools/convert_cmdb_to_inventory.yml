---
# CMDB CSV to Ansible Inventory Converter (BU-based output)
# Produces host metadata only - credentials handled by AAP2.
#
# Required parameters:
#   target_bu        - Business unit identifier (lowercase, e.g., alpha)
#   ssc_environment  - Environment label for ssc_sn_environment (e.g., test, prod)
#   ssc_region       - Region label for ssc_sn_region (e.g., na, eu, apac)
#   inventory_output - Path to the generated inventory file
#
# At least one CSV input is required:
#   cmdb_oracle_csv  - Path to Oracle CMDB CSV export
#   cmdb_mssql_csv   - Path to MSSQL  CMDB CSV export
#
# Optional:
#   inspec_delegate_host - Delegate host for InSpec execution (default: "")
#   exec_timeout         - Per-host scan timeout seconds (default: 600)
#
# Filtering:
#   - Only rows whose 'Validation Status' contains "Validated" are included.
#   - Rows with connection-warning comments ARE included in the inventory but
#     listed in a sidecar diagnostics file: <inventory_output>.diagnostics.yml
#     (CMDB metadata is intentionally NOT written into the inventory itself.)

- name: Convert CMDB CSV to BU-based Inventory
  hosts: localhost
  gather_facts: true
  vars:
    oracle_csv_file: "{{ cmdb_oracle_csv | default('') }}"
    mssql_csv_file: "{{ cmdb_mssql_csv | default('') }}"
    output_file: "{{ inventory_output }}"
    diagnostics_file: "{{ inventory_output }}.diagnostics.yml"

    # Aggregator group (holds BU-wide vars) and platform-specific
    # subgroups. Subgroup names must be unique across tech groups to
    # avoid Ansible's group-name-is-global collision (see
    # DEVTEST_NA_Inv_InSpec_Database header for the rationale).
    bu_group: "db_{{ target_bu }}"
    bu_oracle_group: "db_{{ target_bu }}_oracle"
    bu_mssql_group: "db_{{ target_bu }}_mssql"
    delegate_host: "{{ inspec_delegate_host | default('') }}"
    exec_timeout_value: "{{ exec_timeout | default(600) }}"

    oracle_version_map:
      "12": "12c"
      "19": "19c"
      "21": "21c"
      "23": "23c"

    # NOTE: dict keys are not templated in `vars:`; the BU group is built
    # in pre_tasks via set_fact so the key resolves correctly at runtime.
    inventory_data:
      all:
        children: {}

    platform_counts: { oracle: 0, mssql: 0 }
    skipped_counts: { oracle: 0, mssql: 0 }
    connection_warnings: []

  pre_tasks:
    - name: Validate required parameters
      ansible.builtin.fail:
        msg: "Missing required parameter: {{ item }}"
      when: lookup('vars', item, default='') | length == 0
      loop:
        - target_bu
        - ssc_environment
        - ssc_region
        - inventory_output
      loop_control:
        label: "{{ item }}"

    - name: Validate at least one CSV file provided
      ansible.builtin.fail:
        msg: "At least one CSV file must be provided: cmdb_oracle_csv or cmdb_mssql_csv"
      when:
        - oracle_csv_file | length == 0
        - mssql_csv_file | length == 0

    - name: Initialize aggregator + platform-specific BU subgroups (templated keys)
      ansible.builtin.set_fact:
        inventory_data:
          all:
            children: "{{ {
              bu_group: {
                'vars': bu_vars,
                'children': {
                  bu_mssql_group: {},
                  bu_oracle_group: {}
                }
              },
              'mssql_databases': {
                'children': {bu_mssql_group: {'hosts': {}}}
              },
              'oracle_databases': {
                'children': {bu_oracle_group: {'hosts': {}}}
              }
            } }}"
      vars:
        bu_vars:
          ssc_sn_environment: "{{ ssc_environment }}"
          ssc_sn_region: "{{ ssc_region }}"
          ssc_sn_bu: "{{ target_bu }}"
          exec_timeout: "{{ exec_timeout_value }}"
          ansible_connection: local
          inspec_delegate_host: "{{ delegate_host }}"

  tasks:
    # ==================== Oracle CSV Processing ====================
    - name: Check Oracle CSV exists
      ansible.builtin.stat:
        path: "{{ oracle_csv_file }}"
      register: oracle_stat
      when: oracle_csv_file | length > 0

    - name: Fail if Oracle CSV not found
      ansible.builtin.fail:
        msg: "Oracle CSV file not found: {{ oracle_csv_file }}"
      when:
        - oracle_csv_file | length > 0
        - oracle_stat is defined
        - not oracle_stat.stat.exists

    - name: Parse Oracle CSV with Python (DictReader handles quoted fields)
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import csv, json, sys
            with open(sys.argv[1], newline='', encoding='utf-8-sig') as f:
                print(json.dumps([dict(r) for r in csv.DictReader(f)]))
          - "{{ oracle_csv_file }}"
      register: oracle_csv_parsed
      when:
        - oracle_csv_file | length > 0
        - oracle_stat is defined
        - oracle_stat.stat.exists
      changed_when: false

    - name: Process Oracle entries
      when:
        - oracle_csv_parsed is defined
        - oracle_csv_parsed is not skipped
        - oracle_csv_parsed.rc == 0
      block:
        - name: Set Oracle rows
          ansible.builtin.set_fact:
            oracle_rows: "{{ oracle_csv_parsed.stdout | from_json }}"

        - name: Process each Oracle row
          ansible.builtin.include_tasks: process_cmdb_oracle_line.yml
          loop: "{{ oracle_rows }}"
          loop_control:
            index_var: idx
            label: "Oracle row {{ idx + 1 }}"

    # ==================== MSSQL CSV Processing ====================
    - name: Check MSSQL CSV exists
      ansible.builtin.stat:
        path: "{{ mssql_csv_file }}"
      register: mssql_stat
      when: mssql_csv_file | length > 0

    - name: Fail if MSSQL CSV not found
      ansible.builtin.fail:
        msg: "MSSQL CSV file not found: {{ mssql_csv_file }}"
      when:
        - mssql_csv_file | length > 0
        - mssql_stat is defined
        - not mssql_stat.stat.exists

    - name: Parse MSSQL CSV with Python (DictReader handles quoted fields)
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import csv, json, sys
            with open(sys.argv[1], newline='', encoding='utf-8-sig') as f:
                print(json.dumps([dict(r) for r in csv.DictReader(f)]))
          - "{{ mssql_csv_file }}"
      register: mssql_csv_parsed
      when:
        - mssql_csv_file | length > 0
        - mssql_stat is defined
        - mssql_stat.stat.exists
      changed_when: false

    - name: Process MSSQL entries
      when:
        - mssql_csv_parsed is defined
        - mssql_csv_parsed is not skipped
        - mssql_csv_parsed.rc == 0
      block:
        - name: Set MSSQL rows
          ansible.builtin.set_fact:
            mssql_rows: "{{ mssql_csv_parsed.stdout | from_json }}"

        - name: Process each MSSQL row
          ansible.builtin.include_tasks: process_cmdb_mssql_line.yml
          loop: "{{ mssql_rows }}"
          loop_control:
            index_var: idx
            label: "MSSQL row {{ idx + 1 }}"

    # ==================== Write Output ====================
    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ output_file | dirname }}"
        state: directory
        mode: '0755'
      when: output_file | dirname | length > 0 and output_file | dirname != '.'

    - name: Write inventory file
      ansible.builtin.copy:
        dest: "{{ output_file }}"
        mode: '0644'
        content: |
          ---
          # Generated Inventory - Database Compliance Scanning (CMDB Source)
          # BU: {{ target_bu }} | Env: {{ ssc_environment }} | Region: {{ ssc_region }}
          # Source CMDB files:
          #   Oracle: {{ oracle_csv_file if oracle_csv_file | length > 0 else 'N/A' }}
          #   MSSQL:  {{ mssql_csv_file if mssql_csv_file | length > 0 else 'N/A' }}
          # Generated: {{ ansible_date_time.iso8601 }}
          # Credentials are injected by AAP2 Custom Credential at runtime.

          {{ inventory_data | to_nice_yaml(indent=2) }}

    - name: Write diagnostics sidecar (CMDB connection warnings)
      ansible.builtin.copy:
        dest: "{{ diagnostics_file }}"
        mode: '0644'
        content: |
          ---
          # CMDB Connection-Warning Diagnostics (NOT inventory)
          # These hosts ARE included in the inventory; the warnings come from the
          # CMDB source and are recorded here for triage. They must not be
          # injected into the generated inventory file.
          # Generated: {{ ansible_date_time.iso8601 }}

          {{ {'warnings': connection_warnings} | to_nice_yaml(indent=2) }}
      when: connection_warnings | length > 0

    - name: Summary
      ansible.builtin.debug:
        msg: |
          Conversion complete: {{ output_file }}
          - BU aggregator: {{ bu_group }} (env={{ ssc_environment }}, region={{ ssc_region }})
          - Subgroups: {{ bu_mssql_group }}, {{ bu_oracle_group }}
          - Oracle: {{ platform_counts.oracle }} hosts ({{ skipped_counts.oracle }} skipped)
          - MSSQL:  {{ platform_counts.mssql }} hosts ({{ skipped_counts.mssql }} skipped)
          - Total:  {{ platform_counts.oracle + platform_counts.mssql }} hosts
          - CMDB connection warnings: {{ connection_warnings | length }}{% if connection_warnings | length > 0 %} (see {{ diagnostics_file }}){% endif %}
          - Delegate Host: {{ delegate_host if delegate_host | length > 0 else 'none (local execution)' }}
