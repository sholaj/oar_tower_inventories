---
# Process single line from flat file (tech-group + BU output)
# Format: PLATFORM SERVER DATABASE SERVICE PORT VERSION [CONNECTION] [MODE_SUFFIX]
# CONNECTION  is optional (7th column): WINRM or DIRECT (default: DIRECT)
# MODE_SUFFIX is optional (8th column): free-text suffix appended to host_id
#
# Emits a single host into:
#   inventory_data.all.children[<plat>_databases].children[bu_group].hosts
#
# No per-host database_platform var is emitted -- the platform is implicit
# from the parent group (e.g. mssql_databases), consumed by the matching
# single-platform playbook.

- name: Parse line
  ansible.builtin.set_fact:
    parts: "{{ item.strip().split() }}"

- name: Skip lines with wrong field count
  ansible.builtin.debug:
    msg: "Skipping line {{ idx + 1 }}: expected 6-8 fields, got {{ parts | length }}"
  when: parts | length < 6 or parts | length > 8

- name: Process valid entry
  when: parts | length >= 6 and parts | length <= 8
  block:
    - name: Extract fields
      ansible.builtin.set_fact:
        platform: "{{ parts[0] | upper }}"
        server: "{{ parts[1] }}"
        database: "{{ parts[2] }}"
        service: "{{ parts[3] }}"
        port: "{{ parts[4] }}"
        version: "{{ parts[5] }}"
        connection_mode: >-
          {{
            (parts[6] | upper) if parts | length >= 7
            else (mssql_default_connection | upper) if parts[0] | upper == 'MSSQL'
            else 'DIRECT'
          }}
        mode_suffix: "{{ parts[7] if parts | length == 8 else '' }}"

    - name: Determine WinRM usage
      ansible.builtin.set_fact:
        use_winrm: "{{ connection_mode == 'WINRM' }}"

    - name: Build host_id (FQDN, optionally + mode_suffix)
      # inventory_hostname = FQDN as-is (dots preserved, no port /
      # database / service disambiguator). mode_suffix IS appended
      # when provided since its whole purpose is to allow multiple
      # inventory entries per server (e.g. direct vs winrm).
      # Multiple databases/instances on the same server without a
      # mode_suffix will collide; the collision is surfaced by the
      # "Warn on host_id collision" step below.
      ansible.builtin.set_fact:
        host_id: "{{ server + ('_' + mode_suffix if mode_suffix | length > 0 else '') }}"

    - name: Pre-compute target tech-group host bucket for collision check
      ansible.builtin.set_fact:
        _existing_hosts: >-
          {%- if platform == 'MSSQL' -%}
          {{ inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts }}
          {%- elif platform == 'ORACLE' -%}
          {{ inventory_data.all.children.oracle_databases.children[bu_oracle_group].hosts }}
          {%- elif platform == 'SYBASE' -%}
          {{ inventory_data.all.children.sybase_databases.children[bu_sybase_group].hosts }}
          {%- elif platform in ['POSTGRES', 'POSTGRESQL'] -%}
          {{ inventory_data.all.children.postgres_databases.children[bu_postgres_group].hosts }}
          {%- else -%}
          {}
          {%- endif -%}
      when: platform in ['MSSQL', 'ORACLE', 'SYBASE', 'POSTGRES', 'POSTGRESQL']

    - name: Warn on host_id collision (same FQDN already registered for this platform)
      ansible.builtin.debug:
        msg: >-
          WARNING line {{ idx + 1 }}: host_id '{{ host_id }}' ({{ platform }})
          already exists under {{ bu_group }} — add a MODE_SUFFIX (8th
          column) to keep both rows, or this row will
          {{ 'be ignored (first-wins dedup)' if platform == 'MSSQL'
             else 'overwrite the previous entry' }}.
      when:
        - platform in ['MSSQL', 'ORACLE', 'SYBASE', 'POSTGRES', 'POSTGRESQL']
        - host_id in (_existing_hosts | default({}))

    # NOTE: host-add and counter-bump are merged into a single set_fact per
    # platform. Splitting across tasks under a shared block `when:` causes
    # the second task to skip because the block's when is re-evaluated per
    # task and the dedup condition flips to false after task 1 mutates state.

    # ---------- MSSQL (server-level dedup within the BU child of mssql_databases) ----------
    - name: Add MSSQL host
      when:
        - platform == 'MSSQL'
        - host_id not in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                'mssql_databases': {
                  'children': {
                    bu_mssql_group: {
                      'hosts': inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts | combine({
                        host_id: {
                          'mssql_server': server,
                          'mssql_port': port | int,
                          'mssql_version': version,
                          'mssql_database': 'master',
                          'mssql_username': 'nist_scan_user',
                          'use_winrm': use_winrm
                        }
                      })
                    }
                  }
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'mssql': platform_counts.mssql + 1}) }}"
        winrm_counts: "{{ winrm_counts | combine({'mssql': winrm_counts.mssql + (1 if use_winrm else 0)}) }}"

    - name: Skip duplicate MSSQL
      ansible.builtin.debug:
        msg: "Duplicate MSSQL: {{ server }}:{{ port }}"
      when:
        - platform == 'MSSQL'
        - host_id in inventory_data.all.children.mssql_databases.children[bu_mssql_group].hosts

    # ---------- Oracle (per-database) ----------
    - name: Add Oracle host
      when: platform == 'ORACLE'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                'oracle_databases': {
                  'children': {
                    bu_oracle_group: {
                      'hosts': inventory_data.all.children.oracle_databases.children[bu_oracle_group].hosts | combine({
                        host_id: {
                          'oracle_server': server,
                          'oracle_service': (service if service != 'null' else database),
                          'oracle_port': port | int,
                          'oracle_version': version,
                          'oracle_username': 'nist_scan_user'
                        }
                      })
                    }
                  }
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'oracle': platform_counts.oracle + 1}) }}"

    # ---------- Sybase (per-database, SSH-based) ----------
    - name: Add Sybase host
      when: platform == 'SYBASE'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                'sybase_databases': {
                  'children': {
                    bu_sybase_group: {
                      'hosts': inventory_data.all.children.sybase_databases.children[bu_sybase_group].hosts | combine({
                        host_id: {
                          'sybase_server': server,
                          'sybase_database': database,
                          'sybase_service': (service if service != 'null' else database),
                          'sybase_port': port | int,
                          'sybase_version': version,
                          'sybase_username': 'nist_scan_user',
                          'sybase_use_ssh': true,
                          'sybase_ssh_user': sybase_ssh_user_value
                        }
                      })
                    }
                  }
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'sybase': platform_counts.sybase + 1}) }}"

    # ---------- PostgreSQL (per-database) ----------
    - name: Add PostgreSQL host
      when: platform == 'POSTGRES' or platform == 'POSTGRESQL'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                'postgres_databases': {
                  'children': {
                    bu_postgres_group: {
                      'hosts': inventory_data.all.children.postgres_databases.children[bu_postgres_group].hosts | combine({
                        host_id: {
                          'postgres_server': server,
                          'postgres_database': database,
                          'postgres_service': (service if service != 'null' else ''),
                          'postgres_port': port | int,
                          'postgres_version': version,
                          'postgres_username': 'nist_scan_user'
                        }
                      })
                    }
                  }
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'postgres': platform_counts.postgres + 1}) }}"

    # ---------- Unknown platform ----------
    - name: Warn on unknown platform
      ansible.builtin.debug:
        msg: "WARNING: Unknown platform '{{ platform }}' on line {{ idx + 1 }}, skipping"
      when: platform not in ['MSSQL', 'ORACLE', 'SYBASE', 'POSTGRES', 'POSTGRESQL']
