---
# Process single line from flat file (BU-based output)
# Format: PLATFORM SERVER DATABASE SERVICE PORT VERSION [CONNECTION]
# CONNECTION is optional (7th column): WINRM or DIRECT (default: DIRECT)
#
# Emits a single host into inventory_data.all.children[bu_group].hosts
# with database_platform set per-host so the multi-platform scan playbook
# can dispatch to the correct role.

- name: Parse line
  ansible.builtin.set_fact:
    parts: "{{ item.strip().split() }}"

- name: Skip lines with wrong field count
  ansible.builtin.debug:
    msg: "Skipping line {{ idx + 1 }}: expected 6-7 fields, got {{ parts | length }}"
  when: parts | length < 6 or parts | length > 7

- name: Process valid entry
  when: parts | length >= 6 and parts | length <= 7
  block:
    - name: Extract fields
      ansible.builtin.set_fact:
        platform: "{{ parts[0] | upper }}"
        server: "{{ parts[1] }}"
        database: "{{ parts[2] }}"
        service: "{{ parts[3] }}"
        port: "{{ parts[4] }}"
        version: "{{ parts[5] }}"
        connection_mode: >-
          {{
            (parts[6] | upper) if parts | length == 7
            else (mssql_default_connection | upper) if parts[0] | upper == 'MSSQL'
            else 'DIRECT'
          }}

    - name: Determine WinRM usage
      ansible.builtin.set_fact:
        use_winrm: "{{ connection_mode == 'WINRM' }}"

    - name: Build host_id (MSSQL = server:port; others = server:database:port)
      ansible.builtin.set_fact:
        host_id: >-
          {{
            (server.split('.')[0] + '_' + port) | replace('.', '_') | replace('-', '_')
            if platform == 'MSSQL'
            else (server.split('.')[0] + '_' + database + '_' + port) | replace('.', '_') | replace('-', '_')
          }}

    # NOTE: each platform's host-add and counter-bump are merged into a single
    # set_fact. Splitting them across two tasks under a shared `when:` block
    # causes the second task to skip — the block-level `when` is re-evaluated
    # per task, and the dedup condition flips to false after task 1 mutates
    # inventory_data.

    # ---------- MSSQL (server-level dedup) ----------
    - name: Add MSSQL host
      when:
        - platform == 'MSSQL'
        - host_id not in inventory_data.all.children[bu_group].hosts
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                bu_group: {
                  'hosts': inventory_data.all.children[bu_group].hosts | combine({
                    host_id: {
                      'database_platform': 'mssql',
                      'mssql_server': server,
                      'mssql_port': port | int,
                      'mssql_version': version,
                      'mssql_database': 'master',
                      'mssql_username': 'nist_scan_user',
                      'use_winrm': use_winrm
                    }
                  })
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'mssql': platform_counts.mssql + 1}) }}"
        winrm_counts: "{{ winrm_counts | combine({'mssql': winrm_counts.mssql + (1 if use_winrm else 0)}) }}"

    - name: Skip duplicate MSSQL
      ansible.builtin.debug:
        msg: "Duplicate MSSQL: {{ server }}:{{ port }}"
      when:
        - platform == 'MSSQL'
        - host_id in inventory_data.all.children[bu_group].hosts

    # ---------- Oracle (per-database) ----------
    - name: Add Oracle host
      when: platform == 'ORACLE'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                bu_group: {
                  'hosts': inventory_data.all.children[bu_group].hosts | combine({
                    host_id: {
                      'database_platform': 'oracle',
                      'oracle_server': server,
                      'oracle_service': (service if service != 'null' else database),
                      'oracle_port': port | int,
                      'oracle_version': version,
                      'oracle_username': 'nist_scan_user'
                    }
                  })
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'oracle': platform_counts.oracle + 1}) }}"

    # ---------- Sybase (per-database, SSH-based) ----------
    - name: Add Sybase host
      when: platform == 'SYBASE'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                bu_group: {
                  'hosts': inventory_data.all.children[bu_group].hosts | combine({
                    host_id: {
                      'database_platform': 'sybase',
                      'sybase_server': server,
                      'sybase_database': database,
                      'sybase_service': (service if service != 'null' else database),
                      'sybase_port': port | int,
                      'sybase_version': version,
                      'sybase_username': 'nist_scan_user',
                      'sybase_use_ssh': true,
                      'sybase_ssh_user': sybase_ssh_user_value
                    }
                  })
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'sybase': platform_counts.sybase + 1}) }}"

    # ---------- PostgreSQL (per-database) ----------
    - name: Add PostgreSQL host
      when: platform == 'POSTGRES' or platform == 'POSTGRESQL'
      ansible.builtin.set_fact:
        inventory_data: >-
          {{ inventory_data | combine({
            'all': {
              'children': {
                bu_group: {
                  'hosts': inventory_data.all.children[bu_group].hosts | combine({
                    host_id: {
                      'database_platform': 'postgres',
                      'postgres_server': server,
                      'postgres_database': database,
                      'postgres_service': (service if service != 'null' else ''),
                      'postgres_port': port | int,
                      'postgres_version': version,
                      'postgres_username': 'nist_scan_user'
                    }
                  })
                }
              }
            }
          }, recursive=true) }}
        platform_counts: "{{ platform_counts | combine({'postgres': platform_counts.postgres + 1}) }}"

    # ---------- Unknown platform ----------
    - name: Warn on unknown platform
      ansible.builtin.debug:
        msg: "WARNING: Unknown platform '{{ platform }}' on line {{ idx + 1 }}, skipping"
      when: platform not in ['MSSQL', 'ORACLE', 'SYBASE', 'POSTGRES', 'POSTGRESQL']
